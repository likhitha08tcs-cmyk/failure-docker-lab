Dockerfile is required for building the image.
name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t test-app .

      - name: Run container
        run: |
          docker run test-app
          # Add validation command here
